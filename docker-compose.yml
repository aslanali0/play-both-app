services:
  db:
    image: mongo:latest
    container_name: mongodb_container
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DB_URL=mongodb://db:27017/play_both_db
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=HS256
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: react_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
